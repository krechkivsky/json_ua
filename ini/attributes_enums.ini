[state]	#Статус об`єкту	
 0 = не визначено
 1 = існуючий діючий
 2 = існуючий недіючий
 3 = на реконструкції
 4 = на стадії будівництва (реалізації)
 5 = зруйнований (руїни)
 6 = законсервований
 7 = занедбаний
 8 = проєктний
 9 = проєктний на короткостроковий період
10 = проєктний на середньостроковий період
11 = проєктний на довгостроковий період
12 = запроєктований раніше
13 = аварійний

[change] 	#проєктна зміна стану	
0 = не змінюється (зберігається)
1 = реконструкція
2 = модернізація
3 = ліквідація
4 = демонтаж
5 = знесення
6 = закриття
7 = створення у короткостроковий період
8 = створення у середньостроковий період
9 = створення у довгостроковий період

[status]	#Статус	
0 = не визначено
1 = існуюча
2 = проєктна
3 = проєктна на короткостроковий період
4 = проєктна на середньостроковий період
5 = проєктна на довгостроковий період

[existence]	#Наявність	
0 = не визначено
1 = наявний
2 = відсутній

[hromada_type]	#Тип громади	
